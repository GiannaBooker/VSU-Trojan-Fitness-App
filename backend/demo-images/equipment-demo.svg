<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1134" viewBox="0 0 1200 1134">
  <rect x="0" y="0" width="1200" height="1134" fill="#050814"/>
  <text x="40" y="56" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="26" fill="#f8fafc">Equipment Availability API (Demo Output)</text>
  <text x="40" y="78" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto" font-size="13" fill="#94a3b8">Generated locally from backend services using a demo DB (no HTTP server).</text>
  
  <g>
